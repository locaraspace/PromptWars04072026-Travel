name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs the `postinstall` script → `prisma generate`.
      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy values so env validation passes; the build makes no network calls.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          BETTER_AUTH_SECRET: ci-dummy-secret-0123456789abcdef
          BETTER_AUTH_URL: http://localhost:3000
          OPENAI_API_KEY: sk-ci-dummy
